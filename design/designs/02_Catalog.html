<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Quiz Funnel Studio — Funnel Mode Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   TOKENS (carried forward from Foundations 01)
   ============================================================ */
:root {
  --olive-50:  oklch(0.96 0.018 125);
  --olive-100: oklch(0.88 0.035 128);
  --olive-300: oklch(0.66 0.055 130);
  --olive-500: oklch(0.46 0.058 132);
  --olive-700: oklch(0.32 0.045 134);
  --olive-900: oklch(0.20 0.030 135);

  --cream-50:  oklch(0.985 0.006 85);
  --cream-100: oklch(0.965 0.012 84);
  --cream-200: oklch(0.940 0.018 82);
  --cream-300: oklch(0.905 0.022 80);
  --cream-400: oklch(0.860 0.024 78);

  --neutral-0:   #fff;
  --neutral-50:  oklch(0.985 0.002 250);
  --neutral-100: oklch(0.965 0.004 250);
  --neutral-200: oklch(0.925 0.006 250);
  --neutral-300: oklch(0.870 0.008 250);
  --neutral-400: oklch(0.720 0.010 250);
  --neutral-500: oklch(0.560 0.012 250);
  --neutral-700: oklch(0.320 0.014 250);
  --neutral-900: oklch(0.140 0.010 250);

  --success: oklch(0.58 0.12 150);
  --warning: oklch(0.74 0.13 75);
  --error:   oklch(0.58 0.18 28);

  --result-1: oklch(0.62 0.13 45);
  --result-2: oklch(0.62 0.13 95);
  --result-3: oklch(0.62 0.13 165);
  --result-4: oklch(0.62 0.13 245);
  --result-5: oklch(0.62 0.13 320);

  --font-display: "Instrument Serif", Iowan Old Style, Georgia, serif;
  --font-sans:    "Geist", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "Geist Mono", ui-monospace, "SF Mono", monospace;

  --radius-sm:   6px;
  --radius-md:   12px;
  --radius-lg:   20px;
  --radius-xl:   28px;
  --radius-full: 999px;

  --shadow-1: 0 1px 2px rgba(38,44,30,.05), 0 1px 1px rgba(38,44,30,.04);
  --shadow-2: 0 2px 4px rgba(38,44,30,.06), 0 4px 12px rgba(38,44,30,.05);
  --shadow-3: 0 4px 8px rgba(38,44,30,.06), 0 12px 28px rgba(38,44,30,.08);
  --shadow-4: 0 8px 16px rgba(38,44,30,.07), 0 24px 56px rgba(38,44,30,.10);

  --motion-micro:  120ms;
  --motion-small:  200ms;
  --motion-medium: 320ms;
  --motion-large:  500ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --ease-emphasis: cubic-bezier(0.3, 0, 0, 1);
}

/* ============================================================
   FUNNEL MODE — applied scope-wide for this canvas
   Every primitive renders in funnel mode here; that's the brief.
   ============================================================ */
.funnel {
  --bg:           var(--cream-100);
  --surface:      var(--cream-50);
  --surface-alt:  var(--cream-200);
  --border:       var(--cream-300);
  --border-strong:var(--cream-400);
  --text:         var(--olive-900);
  --text-muted:   color-mix(in oklch, var(--olive-900) 50%, var(--cream-100));
  --text-faint:   color-mix(in oklch, var(--olive-900) 30%, var(--cream-100));
  --accent:       var(--olive-500);
  --accent-deep:  var(--olive-700);
  --accent-fg:    var(--cream-50);
  font-family: var(--font-sans);
  color: var(--text);
}

/* ---------- Page chrome ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  color: var(--neutral-900);
  background: var(--neutral-100);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01";
}

/* ============================================================
   SHEET CHROME
   ============================================================ */
.sheet {
  background: var(--cream-50);
  color: var(--neutral-900);
  font-family: var(--font-sans);
  padding: 56px 64px;
}
.sheet-head {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
  border-bottom: 1px solid var(--neutral-300);
  padding-bottom: 28px;
  margin-bottom: 40px;
}
.sheet-head h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 56px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 12px 0 0;
}
.sheet-head h1 em { font-style: italic; color: var(--olive-700); }
.sheet-head .meta {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--neutral-500);
  line-height: 1.7;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--neutral-500);
}

.cat-section {
  margin-bottom: 64px;
}
.cat-section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--neutral-200);
}
.cat-section-head h2 {
  font-family: var(--font-display);
  font-weight: 400;
  font-style: italic;
  font-size: 30px;
  margin: 0;
  letter-spacing: -0.01em;
}
.cat-section-head .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--neutral-400);
}
.cat-section-head .desc {
  margin-left: auto;
  font-size: 13px;
  color: var(--neutral-600);
  max-width: 540px;
  text-align: right;
}

/* ---------- Primitive card ---------- */
.prim {
  margin-bottom: 32px;
  padding: 32px;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-md);
}
.prim-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 16px;
  align-items: baseline;
  margin-bottom: 24px;
}
.prim-head .name {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 26px;
  letter-spacing: -0.01em;
}
.prim-head .key {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--neutral-500);
  background: var(--neutral-100);
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  align-self: center;
}
.prim-head .props {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--neutral-500);
  text-align: right;
  line-height: 1.6;
  max-width: 380px;
}
.prim-desc {
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--neutral-700);
  max-width: 720px;
  margin: -12px 0 24px;
}

/* ---------- States grid ---------- */
.states {
  display: grid;
  gap: 20px;
}
.states.cols-2 { grid-template-columns: repeat(2, 1fr); }
.states.cols-3 { grid-template-columns: repeat(3, 1fr); }
.states.cols-4 { grid-template-columns: repeat(4, 1fr); }
.states.cols-5 { grid-template-columns: repeat(5, 1fr); }

.state {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.state-frame {
  background: var(--cream-100);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-md);
  padding: 24px;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.state-frame.tight { padding: 16px; min-height: 80px; }
.state-frame.tall { min-height: 220px; align-items: stretch; }
.state-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--neutral-500);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.state-label .tag {
  background: var(--neutral-100);
  color: var(--neutral-600);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
}

/* ---------- Mobile/desktop frame ---------- */
.viewports {
  display: grid;
  grid-template-columns: 375px 1fr;
  gap: 24px;
  align-items: start;
}
.vp-mobile {
  width: 375px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--cream-100);
  border: 1px solid var(--neutral-200);
}
.vp-mobile-head {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--neutral-500);
  padding: 8px 12px;
  background: var(--neutral-50);
  border-bottom: 1px solid var(--neutral-200);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex; justify-content: space-between;
}
.vp-mobile-body { padding: 24px; }

.vp-desktop {
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--cream-100);
  border: 1px solid var(--neutral-200);
}
.vp-desktop-head {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--neutral-500);
  padding: 8px 12px;
  background: var(--neutral-50);
  border-bottom: 1px solid var(--neutral-200);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex; justify-content: space-between;
}
.vp-desktop-body {
  padding: 40px;
  display: flex;
  justify-content: center;
}
.vp-desktop-body > .desktop-content {
  width: 100%;
  max-width: 520px;
}

/* ============================================================
   FUNNEL PRIMITIVES — the actual UI
   These are the components that ship.
   ============================================================ */

/* Heading */
.fn-h1 { font-family: var(--font-display); font-weight: 400; font-size: 36px; line-height: 1.15; letter-spacing: -0.01em; color: var(--text); margin: 0; }
.fn-h2 { font-family: var(--font-display); font-weight: 400; font-size: 28px; line-height: 1.2;  letter-spacing: -0.01em; color: var(--text); margin: 0; }
.fn-h3 { font-family: var(--font-display); font-weight: 400; font-size: 22px; line-height: 1.25; color: var(--text); margin: 0; }
.fn-h1 em, .fn-h2 em, .fn-h3 em { font-style: italic; color: var(--accent-deep); }
.fn-h-muted   { color: var(--text-muted); }
.fn-h-primary { color: var(--accent-deep); }

/* Body */
.fn-body { font-family: var(--font-sans); color: var(--text-muted); margin: 0; }
.fn-body-sm { font-size: 14px; line-height: 1.55; }
.fn-body-md { font-size: 16px; line-height: 1.6; }
.fn-body-lg { font-size: 18px; line-height: 1.55; }

/* Caption */
.fn-caption { font-family: var(--font-sans); font-size: 12px; line-height: 1.5; color: var(--text-faint); margin: 0; }

/* Eyebrow */
.fn-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin: 0;
}

/* ProgressBar */
.fn-progress {
  height: 4px;
  width: 100%;
  background: var(--surface-alt);
  border-radius: 999px;
  overflow: hidden;
}
.fn-progress > .fill {
  height: 100%;
  background: var(--accent);
  border-radius: inherit;
  transition: width var(--motion-medium) var(--ease-emphasis);
}

/* Stack / Group / Spacer (visual demos) */
.fn-stack { display: flex; flex-direction: column; }
.fn-stack-sm { gap: 8px; }
.fn-stack-md { gap: 16px; }
.fn-stack-lg { gap: 24px; }
.fn-stack-xl { gap: 36px; }

.fn-group { display: flex; align-items: center; }
.fn-group-start   { justify-content: flex-start; gap: 12px; }
.fn-group-center  { justify-content: center; gap: 12px; }
.fn-group-between { justify-content: space-between; gap: 12px; }

/* PrimaryCTA */
.fn-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: var(--font-sans);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.005em;
  width: 100%;
  padding: 18px 22px;
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  box-shadow: var(--shadow-2);
  transition: transform var(--motion-micro) var(--ease-standard),
              background var(--motion-small) var(--ease-standard),
              box-shadow var(--motion-small) var(--ease-standard);
}
.fn-cta:hover { background: var(--accent-deep); }
.fn-cta:active { transform: translateY(1px); box-shadow: var(--shadow-1); }
.fn-cta:disabled, .fn-cta.is-disabled {
  background: var(--surface-alt);
  color: var(--text-faint);
  box-shadow: none;
  cursor: not-allowed;
}
.fn-cta.is-loading { color: transparent; position: relative; pointer-events: none; }
.fn-cta.is-loading::after {
  content: "";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='9' fill='none' stroke='white' stroke-opacity='0.25' stroke-width='3'/><path d='M21 12a9 9 0 0 0-9-9' fill='none' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>") center / 22px no-repeat;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(1turn); } }

/* SecondaryLink */
.fn-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 8px 16px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-sans);
  font-size: 14px;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
}
.fn-link:hover { color: var(--text); }

/* BackButton */
.fn-back {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  background: transparent;
  border: none;
  border-radius: var(--radius-full);
  color: var(--text);
  cursor: pointer;
  transition: background var(--motion-small) var(--ease-standard);
}
.fn-back:hover { background: var(--surface-alt); }
.fn-back svg { width: 20px; height: 20px; }

/* ChoiceList option */
.fn-choice {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: border-color var(--motion-small) var(--ease-standard),
              background var(--motion-small) var(--ease-standard),
              transform var(--motion-micro) var(--ease-standard);
  font-size: 16px;
  color: var(--text);
}
.fn-choice:hover { border-color: var(--border-strong); }
.fn-choice .marker {
  width: 22px; height: 22px; border-radius: 999px;
  border: 1.5px solid var(--border-strong);
  flex-shrink: 0;
  display: grid; place-items: center;
}
.fn-choice .icon { width: 24px; height: 24px; color: var(--text-muted); flex-shrink: 0; }
.fn-choice .label { flex: 1; }
.fn-choice.is-focused {
  outline: 3px solid color-mix(in oklch, var(--accent) 30%, transparent);
  outline-offset: 2px;
  border-color: var(--border-strong);
}
.fn-choice.is-selected {
  border-color: var(--accent);
  background: color-mix(in oklch, var(--accent) 6%, var(--surface));
}
.fn-choice.is-selected .marker {
  border-color: var(--accent);
  background: var(--accent);
}
.fn-choice.is-selected .marker::after {
  content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent-fg);
}
.fn-choice.is-error { border-color: var(--error); background: color-mix(in oklch, var(--error) 4%, var(--surface)); }

/* Multi-choice marker = square */
.fn-choice .marker.box { border-radius: 6px; }
.fn-choice.is-selected .marker.box { background: var(--accent); }
.fn-choice.is-selected .marker.box::after {
  content: "";
  width: 12px; height: 12px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>") center / contain no-repeat;
  border-radius: 0;
}

/* BinaryChoice */
.fn-binary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fn-binary > button {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 16px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: pointer;
  font-family: var(--font-sans);
  color: var(--text);
  transition: border-color var(--motion-small) var(--ease-standard),
              background var(--motion-small) var(--ease-standard),
              transform var(--motion-micro) var(--ease-standard);
}
.fn-binary > button:hover { border-color: var(--border-strong); }
.fn-binary > button.is-selected {
  border-color: var(--accent);
  background: color-mix(in oklch, var(--accent) 6%, var(--surface));
}
.fn-binary .glyph {
  width: 56px; height: 56px;
  border-radius: 999px;
  background: var(--surface-alt);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text);
}
.fn-binary .glyph.yes { background: color-mix(in oklch, var(--accent) 18%, var(--surface)); color: var(--accent-deep); }
.fn-binary > button.is-selected .glyph { background: var(--accent); color: var(--accent-fg); }
.fn-binary .lbl { font-size: 18px; font-family: var(--font-display); }

/* ScaleInput */
.fn-scale { display: flex; flex-direction: column; gap: 10px; }
.fn-scale-track {
  display: grid;
  gap: 6px;
}
.fn-scale-track.cols-5 { grid-template-columns: repeat(5, 1fr); }
.fn-scale-track.cols-10 { grid-template-columns: repeat(10, 1fr); }
.fn-scale-step {
  height: 48px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  display: grid; place-items: center;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--motion-small) var(--ease-standard);
}
.fn-scale-step:hover { border-color: var(--border-strong); color: var(--text); }
.fn-scale-step.is-selected {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
  font-weight: 500;
}
.fn-scale-ends {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* SliderInput */
.fn-slider { display: flex; flex-direction: column; gap: 14px; }
.fn-slider-rail {
  position: relative;
  height: 6px;
  background: var(--surface-alt);
  border-radius: 999px;
}
.fn-slider-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: inherit;
}
.fn-slider-thumb {
  position: absolute;
  top: 50%;
  width: 24px; height: 24px;
  border-radius: 999px;
  background: var(--accent-fg);
  border: 3px solid var(--accent);
  transform: translate(-50%, -50%);
  box-shadow: var(--shadow-2);
}
.fn-slider-bubble {
  position: absolute;
  bottom: 22px;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--accent-fg);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.fn-slider-bubble::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--text);
}
.fn-slider-ends {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

/* TextInput */
.fn-input {
  font-family: var(--font-sans);
  font-size: 17px;
  line-height: 1.4;
  width: 100%;
  padding: 18px 20px;
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  transition: border-color var(--motion-small) var(--ease-standard);
}
.fn-input:hover { border-color: var(--border-strong); }
.fn-input::placeholder { color: var(--text-faint); }
.fn-input.is-focused {
  border-color: var(--accent);
  outline: 3px solid color-mix(in oklch, var(--accent) 25%, transparent);
  outline-offset: 0;
}
.fn-input.is-error { border-color: var(--error); }
.fn-input-error {
  font-size: 13px;
  color: var(--error);
  margin: 6px 4px 0;
}

.fn-textarea {
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.55;
  width: 100%;
  padding: 18px 20px;
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  min-height: 120px;
  resize: vertical;
}
.fn-textarea-meta {
  display: flex; justify-content: flex-end;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin: 6px 4px 0;
}

/* ImageChoiceGrid */
.fn-imgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fn-imgcard {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--motion-small) var(--ease-standard);
  display: flex; flex-direction: column;
}
.fn-imgcard:hover { border-color: var(--border-strong); }
.fn-imgcard.is-selected { border-color: var(--accent); }
.fn-imgcard .placeholder {
  aspect-ratio: 1;
  background:
    repeating-linear-gradient(135deg,
      var(--surface-alt) 0 8px,
      color-mix(in oklch, var(--surface-alt) 60%, var(--cream-50)) 8px 16px);
  position: relative;
  display: grid; place-items: center;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.fn-imgcard.is-selected .placeholder::after {
  content: "";
  position: absolute;
  top: 10px; right: 10px;
  width: 22px; height: 22px;
  border-radius: 999px;
  background: var(--accent) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>") center / 14px no-repeat;
}
.fn-imgcard .lbl {
  padding: 12px 14px;
  font-size: 15px;
  color: var(--text);
}

/* RankList */
.fn-rank { display: flex; flex-direction: column; gap: 10px; }
.fn-rank-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: grab;
}
.fn-rank-row .num {
  width: 28px; height: 28px;
  border-radius: 999px;
  background: var(--surface-alt);
  color: var(--text);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
}
.fn-rank-row .lbl { flex: 1; font-size: 15px; }
.fn-rank-row .grip {
  display: grid; gap: 3px;
  color: var(--text-faint);
}
.fn-rank-row .grip span {
  width: 14px; height: 2px;
  background: currentColor;
  border-radius: 1px;
}
.fn-rank-row.is-dragging {
  background: var(--accent-fg);
  border-color: var(--accent);
  box-shadow: var(--shadow-3);
  transform: rotate(-1deg);
  cursor: grabbing;
}

/* PriceCard */
.fn-price {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  transition: border-color var(--motion-small) var(--ease-standard),
              background var(--motion-small) var(--ease-standard);
  position: relative;
}
.fn-price:hover { border-color: var(--border-strong); }
.fn-price.is-selected {
  border-color: var(--accent);
  background: color-mix(in oklch, var(--accent) 5%, var(--surface));
}
.fn-price .marker {
  width: 22px; height: 22px; border-radius: 999px;
  border: 1.5px solid var(--border-strong);
  flex-shrink: 0;
}
.fn-price.is-selected .marker {
  border-color: var(--accent);
  background: var(--accent);
  display: grid; place-items: center;
}
.fn-price.is-selected .marker::after {
  content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent-fg);
}
.fn-price .body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.fn-price .title { font-size: 15px; font-weight: 500; color: var(--text); }
.fn-price .perunit { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.fn-price .price-stack { text-align: right; }
.fn-price .big {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.01em;
}
.fn-price .term { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.fn-price .save-pill {
  position: absolute;
  top: -10px; right: 16px;
  background: var(--accent-deep);
  color: var(--accent-fg);
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
}

/* PlanToggle */
.fn-plan {
  display: inline-grid;
  grid-template-columns: 1fr 1fr;
  background: var(--surface-alt);
  padding: 4px;
  border-radius: 999px;
  position: relative;
  font-family: var(--font-sans);
  font-size: 14px;
  width: 100%;
}
.fn-plan button {
  background: transparent;
  border: none;
  padding: 12px 16px;
  border-radius: 999px;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  z-index: 1;
  font-family: inherit;
  font-size: inherit;
  transition: color var(--motion-small) var(--ease-standard);
}
.fn-plan button.is-selected { color: var(--text); font-weight: 500; }
.fn-plan-pill {
  position: absolute;
  top: 4px; bottom: 4px;
  left: 4px;
  width: calc(50% - 4px);
  background: var(--surface);
  border-radius: 999px;
  box-shadow: var(--shadow-1);
  transition: transform var(--motion-medium) var(--ease-emphasis);
}
.fn-plan[data-pos="1"] .fn-plan-pill { transform: translateX(100%); }

/* TrialBadge */
.fn-trial-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: color-mix(in oklch, var(--accent) 14%, var(--surface));
  color: var(--accent-deep);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 500;
}
.fn-trial-badge::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--accent);
}

/* SocialProofRow */
.fn-proof {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 0;
}
.fn-proof-cell {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  text-align: center;
  padding: 0 12px;
  border-right: 1px solid var(--border);
}
.fn-proof-cell:last-child { border-right: none; }
.fn-proof-cell .num {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -0.01em;
  color: var(--text);
  display: flex; align-items: center; gap: 4px;
}
.fn-proof-cell .num svg { width: 16px; height: 16px; color: var(--warning); }
.fn-proof-cell .lbl {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* TestimonialCard */
.fn-testimonial {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.fn-testimonial .quote {
  font-family: var(--font-display);
  font-size: 19px;
  line-height: 1.4;
  color: var(--text);
  letter-spacing: -0.005em;
}
.fn-testimonial .quote::before { content: "“"; color: var(--accent); margin-right: 2px; }
.fn-testimonial .quote::after  { content: "”"; color: var(--accent); margin-left: 2px; }
.fn-testimonial .who { display: flex; align-items: center; gap: 12px; }
.fn-testimonial .avatar {
  width: 36px; height: 36px;
  border-radius: 999px;
  background:
    conic-gradient(from 120deg,
      var(--accent),
      color-mix(in oklch, var(--accent) 50%, var(--cream-200)),
      var(--accent));
  position: relative;
  flex-shrink: 0;
}
.fn-testimonial .avatar::after {
  content: "";
  position: absolute;
  inset: 5px;
  background: var(--surface);
  border-radius: 999px;
}
.fn-testimonial .meta {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.4;
}
.fn-testimonial .meta strong { color: var(--text); font-weight: 500; }

/* BenefitList */
.fn-benefits { display: flex; flex-direction: column; gap: 10px; }
.fn-benefits .row { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; color: var(--text); line-height: 1.5; }
.fn-benefits .check {
  width: 22px; height: 22px;
  border-radius: 999px;
  background: color-mix(in oklch, var(--accent) 18%, var(--surface));
  display: grid; place-items: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.fn-benefits .check svg { width: 12px; height: 12px; color: var(--accent-deep); }

/* Disclaimer */
.fn-disclaimer {
  font-family: var(--font-sans);
  font-size: 11.5px;
  line-height: 1.55;
  color: var(--text-faint);
  text-align: center;
  margin: 0;
}
.fn-disclaimer a { color: var(--text-muted); text-decoration: underline; }

/* ScoreReadout */
.fn-score {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.fn-score .head { display: flex; align-items: baseline; justify-content: space-between; }
.fn-score .num {
  font-family: var(--font-display);
  font-size: 36px;
  letter-spacing: -0.01em;
}
.fn-score .num em { font-style: normal; color: var(--text-muted); font-size: 0.6em; }
.fn-score .band-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  font-weight: 500;
}
.fn-score-bar {
  height: 12px;
  border-radius: 999px;
  background:
    linear-gradient(to right,
      var(--result-1) 0%, var(--result-1) 33%,
      var(--result-2) 33%, var(--result-2) 66%,
      var(--result-3) 66%, var(--result-3) 100%);
  position: relative;
}
.fn-score-bar .marker {
  position: absolute;
  top: 50%;
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--accent-fg);
  border: 3px solid var(--text);
  transform: translate(-50%, -50%);
  box-shadow: var(--shadow-2);
}
.fn-score-bar .ticks { position: absolute; inset: 0; }
.fn-score-bar .ticks span {
  position: absolute;
  top: 100%; margin-top: 6px;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* PersonaReveal */
.fn-persona {
  border-radius: var(--radius-xl);
  padding: 32px 24px;
  display: flex; flex-direction: column; gap: 14px;
  text-align: center;
  background: color-mix(in oklch, var(--persona-color) 14%, var(--surface));
  border: 1px solid color-mix(in oklch, var(--persona-color) 40%, var(--border));
}
.fn-persona .eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--persona-color);
  font-weight: 500;
}
.fn-persona .name {
  font-family: var(--font-display);
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -0.015em;
  color: var(--text);
}
.fn-persona .name em { font-style: italic; color: var(--persona-color); }
.fn-persona .blurb {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.55;
}

/* ResultBand */
.fn-band {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  background: color-mix(in oklch, var(--band-color) 16%, var(--surface));
  color: color-mix(in oklch, var(--band-color) 70%, var(--text));
  border: 1px solid color-mix(in oklch, var(--band-color) 35%, var(--border));
}
.fn-band::before {
  content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--band-color);
}

/* ============================================================
   SCREEN ANATOMY (annotated diagram)
   ============================================================ */
.anatomy-wrap { display: grid; grid-template-columns: 375px 1fr; gap: 64px; align-items: start; }
.anatomy-screen {
  width: 375px;
  height: 720px;
  background: var(--cream-100);
  border: 1px solid var(--neutral-200);
  border-radius: 36px;
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
}
.anat-row { position: relative; }
.anat-row.progress {
  padding: 20px 24px 12px;
  background: var(--cream-100);
}
.anat-row.topbar {
  padding: 8px 16px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.anat-row.body {
  flex: 1;
  padding: 28px 24px 24px;
  display: flex; flex-direction: column; gap: 24px;
}
.anat-row.footer {
  padding: 16px 24px 32px;
  background: var(--cream-100);
  border-top: 1px solid var(--cream-300);
  display: flex; flex-direction: column; gap: 10px;
}

.anat-label {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--neutral-600);
  white-space: nowrap;
}
.anat-label::before {
  content: "";
  display: inline-block;
  width: 36px; height: 1px;
  background: var(--neutral-400);
  vertical-align: middle;
  margin-right: 8px;
}

.anatomy-key {
  display: flex; flex-direction: column; gap: 24px;
  padding-top: 12px;
}
.anatomy-key .row { display: grid; grid-template-columns: 96px 1fr; gap: 16px; padding-bottom: 18px; border-bottom: 1px solid var(--neutral-200); }
.anatomy-key .row:last-child { border-bottom: none; }
.anatomy-key .row .slot {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--neutral-700);
  padding-top: 2px;
}
.anatomy-key .row h4 {
  margin: 0;
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 22px;
  color: var(--neutral-900);
}
.anatomy-key .row p { margin: 4px 0 0; font-size: 13.5px; color: var(--neutral-700); line-height: 1.55; }

/* ---------- Transition diagram ---------- */
.transition-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  align-items: center;
  padding: 32px;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-md);
}
.trans-frames {
  position: relative;
  height: 360px;
  background: var(--neutral-50);
  border-radius: var(--radius-md);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.trans-frame {
  position: absolute;
  width: 200px; height: 320px;
  border-radius: 24px;
  background: var(--cream-100);
  border: 1px solid var(--cream-300);
  display: flex; flex-direction: column;
  padding: 18px 16px;
  gap: 12px;
  box-shadow: var(--shadow-2);
}
.trans-frame .pb { height: 3px; background: var(--accent); width: 38%; border-radius: 999px; }
.trans-frame .h  { font-family: var(--font-display); font-size: 22px; line-height: 1.15; color: var(--olive-900); }
.trans-frame .h em { font-style: italic; color: var(--accent-deep); }
.trans-frame .opt { background: var(--cream-50); border: 1.5px solid var(--cream-300); border-radius: 14px; padding: 10px 12px; font-size: 12px; color: var(--olive-900); }
.trans-frame .opt.sel { border-color: var(--accent); background: color-mix(in oklch, var(--accent) 6%, var(--cream-50)); }
.trans-frame .cta { margin-top: auto; background: var(--accent); color: var(--cream-50); padding: 12px; border-radius: 14px; text-align: center; font-size: 13px; }

.trans-frame.outgoing { animation: outgoing 3.6s var(--ease-emphasis) infinite; z-index: 1; }
.trans-frame.incoming { animation: incoming 3.6s var(--ease-emphasis) infinite; z-index: 2; }
@keyframes outgoing {
  0%, 30%       { transform: translateX(0); opacity: 1; }
  60%, 100%     { transform: translateX(-100px); opacity: 0; }
}
@keyframes incoming {
  0%, 30%       { transform: translateX(220px); opacity: 0; }
  60%, 100%     { transform: translateX(0); opacity: 1; }
}

.trans-spec {
  font-family: var(--font-sans);
  display: flex; flex-direction: column; gap: 16px;
}
.trans-spec h3 {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 26px;
  margin: 0;
}
.trans-spec dl {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 6px 12px;
  margin: 0;
  font-size: 13px;
}
.trans-spec dt {
  font-family: var(--font-mono);
  color: var(--neutral-500);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  align-self: center;
}
.trans-spec dd {
  margin: 0;
  color: var(--neutral-800);
}
.trans-spec dd code {
  font-family: var(--font-mono);
  background: var(--neutral-100);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
}

/* ============================================================
   COMPOSITIONS (4 example screens, mobile)
   ============================================================ */
.comp-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.comp {
  display: flex; flex-direction: column; gap: 12px;
}
.comp-frame {
  width: 100%;
  aspect-ratio: 375 / 720;
  background: var(--cream-100);
  border-radius: 32px;
  border: 1px solid var(--neutral-200);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.comp-progress { padding: 16px 20px 8px; }
.comp-progress .pb { height: 3px; background: var(--cream-300); border-radius: 999px; overflow: hidden; }
.comp-progress .pb > div { background: var(--accent); height: 100%; border-radius: inherit; }
.comp-topbar { padding: 4px 12px 0; display: flex; align-items: center; }
.comp-body { flex: 1; padding: 20px 22px 16px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
.comp-footer { padding: 10px 22px 24px; display: flex; flex-direction: column; gap: 8px; }

.comp .title-row {
  display: flex; align-items: baseline; justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--neutral-500);
}
.comp .title-row .name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 18px;
  letter-spacing: -0.005em;
  color: var(--neutral-900);
  text-transform: none;
}

</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!--
  All JSX is inlined below in a single <script type="text/babel"> block.
  External relative .jsx fetches require a preview token the browser doesn't have,
  so external loading silently 401s — inline is the reliable path.
-->
<script type="text/babel" id="canvas-src">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note

function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (

      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });

        </div>

    </div>
  );
}

Object.assign(window, { AnatomySheet, CompositionsSheet });

</script>
