<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Quiz Funnel Studio — Results Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --olive-50: oklch(0.96 0.018 125);
  --olive-100:oklch(0.88 0.035 128);
  --olive-300:oklch(0.66 0.055 130);
  --olive-500:oklch(0.46 0.058 132);
  --olive-700:oklch(0.32 0.045 134);
  --olive-900:oklch(0.20 0.030 135);
  --cream-50: oklch(0.985 0.006 85);
  --cream-100:oklch(0.965 0.012 84);
  --cream-200:oklch(0.940 0.018 82);
  --cream-300:oklch(0.905 0.022 80);
  --cream-400:oklch(0.860 0.024 78);

  /* Result palette — 5 colors used across funnel result screens */
  --r1:oklch(0.62 0.13 45);   /* warm amber */
  --r2:oklch(0.62 0.13 95);   /* gold */
  --r3:oklch(0.58 0.12 150);  /* sage */
  --r4:oklch(0.62 0.13 245);  /* slate-blue */
  --r5:oklch(0.58 0.13 320);  /* mauve */

  /* Source palette */
  --src-tt:oklch(0.62 0.13 320);  /* tiktok mauve */
  --src-ig:oklch(0.62 0.13 30);   /* ig coral */
  --src-fb:oklch(0.55 0.13 245);  /* fb blue */
  --src-dr:oklch(0.55 0.04 130);  /* direct olive-gray */

  --n-0:#fff;
  --n-50: oklch(0.985 0.002 250);
  --n-100:oklch(0.965 0.004 250);
  --n-150:oklch(0.945 0.005 250);
  --n-200:oklch(0.925 0.006 250);
  --n-300:oklch(0.870 0.008 250);
  --n-400:oklch(0.720 0.010 250);
  --n-500:oklch(0.560 0.012 250);
  --n-600:oklch(0.440 0.014 250);
  --n-700:oklch(0.320 0.014 250);
  --n-800:oklch(0.220 0.012 250);
  --n-900:oklch(0.140 0.010 250);

  --success:oklch(0.58 0.12 150);
  --warning:oklch(0.74 0.13 75);
  --error:oklch(0.58 0.18 28);

  --font-d:"Instrument Serif",Iowan Old Style,Georgia,serif;
  --font-s:"Geist",ui-sans-serif,system-ui,sans-serif;
  --font-m:"Geist Mono",ui-monospace,"SF Mono",monospace;

  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-full:999px;
  --sh-1:0 1px 2px rgba(38,44,30,.05),0 1px 1px rgba(38,44,30,.04);
  --sh-2:0 2px 4px rgba(38,44,30,.06),0 4px 12px rgba(38,44,30,.05);
  --sh-3:0 4px 8px rgba(38,44,30,.06),0 12px 28px rgba(38,44,30,.08);

  --m-fast:120ms;--m-mid:200ms;--m-med:320ms;
  --ease:cubic-bezier(0.2,0,0,1);
  --ease-em:cubic-bezier(0.3,0,0,1);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:var(--font-s);color:var(--n-900);background:var(--n-100);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01"}

/* ================================================
   STUDIO mode chrome (dashboard lives in studio mode)
================================================ */
.studio{
  --bg:var(--n-50);
  --surface:var(--n-0);
  --surface-2:var(--n-100);
  --surface-3:var(--n-150);
  --border:var(--n-200);
  --border-strong:var(--n-300);
  --text:var(--n-900);
  --text-mute:var(--n-600);
  --text-faint:var(--n-500);
  --accent:var(--olive-700);
  --accent-soft:color-mix(in oklch,var(--olive-500) 12%,var(--n-0));
  --accent-fg:var(--cream-50);
  --ring:var(--olive-500);
  font-family:var(--font-s);color:var(--text);background:var(--bg);
}

/* board chrome */
.board{background:var(--n-50);display:flex;flex-direction:column;font-family:var(--font-s)}
.board-header{
  background:var(--n-0);border-bottom:1px solid var(--n-200);
  padding:18px 24px;display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--font-m);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--n-600);
}
.board-header .ttl{
  font-family:var(--font-d);font-style:italic;font-weight:400;
  font-size:22px;letter-spacing:-0.005em;text-transform:none;color:var(--n-900);
}
.board-header .meta{display:flex;gap:24px;align-items:baseline}
.board-header .meta .pill{background:var(--n-100);color:var(--n-700);padding:3px 10px;border-radius:999px;letter-spacing:0.04em}

.s-btn{
  font:inherit;font-size:12.5px;font-weight:500;
  padding:7px 12px;border-radius:6px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid transparent;height:30px;
}
.s-btn.primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.s-btn.primary:hover{background:var(--olive-900)}
.s-btn.secondary{background:var(--surface);color:var(--text);border-color:var(--border)}
.s-btn.secondary:hover{background:var(--surface-2)}
.s-btn.ghost{background:transparent;color:var(--text-mute)}
.s-btn.ghost:hover{background:var(--surface-2);color:var(--text)}
.s-btn svg{width:13px;height:13px}

.s-logo{display:flex;align-items:center;gap:10px;font-family:var(--font-s);font-size:13px;font-weight:500;color:var(--text)}
.s-logo .mark{
  width:22px;height:22px;border-radius:6px;
  background:linear-gradient(135deg,var(--olive-700),var(--olive-500));
  display:grid;place-items:center;color:var(--cream-50);
  font-family:var(--font-d);font-size:14px;font-style:italic;line-height:1;
}
.s-logo .name em{font-style:italic;color:var(--olive-700);font-family:var(--font-d);font-size:15px;letter-spacing:-0.005em;margin-right:2px}

/* ================================================
   DASHBOARD — top bar
================================================ */
.dash{display:flex;flex-direction:column;background:var(--bg);min-height:100%}
.dash-topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:10;
}
.dash-topbar .crumb{
  display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-mute);
}
.dash-topbar .crumb a{color:var(--text-mute);text-decoration:none}
.dash-topbar .crumb a:hover{color:var(--text)}
.dash-topbar .crumb .sep{color:var(--text-faint)}
.dash-topbar .spacer{flex:1}
.dash-topbar .actions{display:flex;gap:8px}

/* dashboard hero header */
.dash-hero{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:24px 28px 22px;
  display:flex;flex-direction:column;gap:14px;
}
.dash-hero .row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dash-hero .h1{
  font-family:var(--font-d);font-style:italic;font-weight:400;
  font-size:38px;letter-spacing:-0.01em;line-height:1;color:var(--text);
  margin:0;
}
.status-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 11px 4px 9px;border-radius:var(--r-full);
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;
}
.status-pill.live{background:color-mix(in oklch,var(--success) 13%,var(--surface));color:var(--success)}
.status-pill.live .dot{
  width:6px;height:6px;border-radius:999px;background:var(--success);
  box-shadow:0 0 0 3px color-mix(in oklch,var(--success) 22%,transparent);
}
.status-pill.draft{background:var(--surface-2);color:var(--text-mute)}
.status-pill.draft .dot{width:6px;height:6px;border-radius:999px;background:var(--text-faint)}

.dash-hero .updated{
  font-family:var(--font-m);font-size:11px;color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase;
  margin-left:auto;
}
.dash-hero .row2{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.url-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:5px 4px 5px 12px;height:32px;
  font-family:var(--font-m);font-size:12px;color:var(--text);
  max-width:380px;
}
.url-chip .url{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.url-chip .copy{
  height:24px;padding:0 9px;border-radius:5px;
  background:var(--surface);border:1px solid var(--border);
  font:inherit;font-size:11.5px;font-family:var(--font-s);color:var(--text);cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
}
.url-chip .copy svg{width:11px;height:11px}
.dash-hero .quick-stats{
  display:flex;gap:18px;margin-left:auto;color:var(--text-mute);font-family:var(--font-m);font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
}
.dash-hero .quick-stats .qs{display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.dash-hero .quick-stats .qs .v{font-family:var(--font-s);font-size:18px;color:var(--text);font-weight:500;letter-spacing:-0.005em;text-transform:none;font-variant-numeric:tabular-nums}

/* ================================================
   VARIANT SELECTOR
================================================ */
.variant-row{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:53px;z-index:9;
}
.variant-tabs{display:flex;gap:0}
.variant-tab{
  position:relative;
  padding:14px 18px 14px;
  font-family:var(--font-s);font-size:13px;font-weight:500;color:var(--text-mute);
  background:transparent;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
}
.variant-tab .dot{width:7px;height:7px;border-radius:999px;background:var(--n-300)}
.variant-tab.is-active{color:var(--text)}
.variant-tab.is-active::after{
  content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:2px;background:var(--accent);
}
.variant-tab .count{
  font-family:var(--font-m);font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums;
  background:var(--surface-2);border-radius:4px;padding:1px 6px;
}
.variant-tab.is-active .count{color:var(--text-mute);background:var(--accent-soft)}
.variant-tab.all .dot{background:var(--text-mute);width:0;height:0;display:none}
.variant-tab.va .dot{background:var(--olive-500)}
.variant-tab.vb .dot{background:var(--r4)}
.variant-tab.vc .dot{background:var(--r5)}

.range-picker{
  display:inline-flex;align-items:center;gap:0;
  background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  font-family:var(--font-s);font-size:12px;height:30px;
}
.range-picker button{
  background:transparent;border:none;padding:0 11px;height:100%;color:var(--text-mute);cursor:pointer;font:inherit;font-weight:500;
}
.range-picker button:not(:last-child){border-right:1px solid var(--border)}
.range-picker button.is-active{background:var(--surface);color:var(--text);box-shadow:var(--sh-1)}

/* ================================================
   DASHBOARD body
================================================ */
.dash-body{
  display:flex;flex-direction:column;gap:24px;
  padding:24px 28px 64px;
}
.dash-section{display:flex;flex-direction:column;gap:12px}
.dash-section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.dash-section-head h2{
  font-family:var(--font-d);font-style:italic;font-weight:400;
  font-size:22px;letter-spacing:-0.005em;line-height:1;color:var(--text);margin:0;
}
.dash-section-head .desc{font-size:12.5px;color:var(--text-mute);max-width:480px;line-height:1.45}
.dash-section-head .right{display:flex;align-items:center;gap:8px;font-family:var(--font-m);font-size:11px;color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;
}
.card.padded{padding:18px 20px}

/* ================================================
   ALL-VARIANTS COMPARISON TABLE
================================================ */
.cmp-table{
  width:100%;border-collapse:separate;border-spacing:0;font-size:13px;
}
.cmp-table thead th{
  text-align:left;padding:12px 16px;
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);font-weight:500;
  border-bottom:1px solid var(--border);background:var(--surface-2);
}
.cmp-table thead th.num{text-align:right;font-variant-numeric:tabular-nums}
.cmp-table tbody td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.cmp-table tbody tr:last-child td{border-bottom:none}
.cmp-table tbody tr{cursor:pointer;transition:background var(--m-fast) var(--ease)}
.cmp-table tbody tr:hover{background:var(--surface-2)}
.cmp-table .num{text-align:right;font-variant-numeric:tabular-nums}
.cmp-table .v-name{display:flex;align-items:center;gap:10px}
.cmp-table .v-swatch{width:8px;height:36px;border-radius:3px}
.cmp-table .v-meta{display:flex;flex-direction:column;gap:2px}
.cmp-table .v-meta .name{font-weight:500;color:var(--text)}
.cmp-table .v-meta .sub{font-family:var(--font-m);font-size:10.5px;color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase}
.cmp-table .big{font-size:16px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.005em}
.cmp-table .pct-bar{
  display:flex;flex-direction:column;gap:3px;align-items:flex-end;
}
.cmp-table .pct-bar .bar{
  width:88px;height:4px;background:var(--surface-2);border-radius:999px;overflow:hidden;
}
.cmp-table .pct-bar .bar > div{height:100%;background:var(--accent);border-radius:inherit}
.cmp-table .pct-bar .v{font-size:13px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}
.cmp-table .winner{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:10px;
  background:color-mix(in oklch,var(--success) 14%,var(--surface));color:var(--success);
  border-radius:3px;padding:1px 5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;
}
.cmp-table .top-result{
  display:inline-flex;align-items:center;gap:6px;
}
.cmp-table .top-result .swatch{width:10px;height:10px;border-radius:3px}
.cmp-table .arrow{color:var(--text-faint)}

/* sparkline */
.spark{display:block}
.spark path.area{fill:color-mix(in oklch,var(--olive-500) 14%,transparent)}
.spark path.line{fill:none;stroke:var(--olive-700);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.spark circle{fill:var(--accent);stroke:var(--surface);stroke-width:1.5}

/* ================================================
   STAT CARDS (single variant)
================================================ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 20px 16px;display:flex;flex-direction:column;gap:14px;min-height:148px;
  position:relative;overflow:hidden;
}
.stat-card .lbl{
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);
  display:flex;align-items:center;gap:6px;
}
.stat-card .lbl .info{
  width:13px;height:13px;border-radius:999px;border:1px solid var(--border-strong);
  display:grid;place-items:center;color:var(--text-faint);font-size:9px;font-family:var(--font-s);
}
.stat-card .v{
  font-family:var(--font-s);font-size:34px;font-weight:500;letter-spacing:-0.015em;color:var(--text);
  font-variant-numeric:tabular-nums;line-height:1;
}
.stat-card .delta{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--font-m);font-size:11px;font-variant-numeric:tabular-nums;color:var(--success);
}
.stat-card .delta.neg{color:var(--error)}
.stat-card .delta svg{width:11px;height:11px}
.stat-card .body{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:auto}
.stat-card .spark-wrap{flex:1;height:42px;margin-top:auto}
.stat-card .progress-circle{flex-shrink:0}

/* progress ring */
.ring{display:block}
.ring .track{stroke:var(--surface-2);fill:none}
.ring .fill{stroke:var(--accent);fill:none;transition:stroke-dashoffset var(--m-med) var(--ease-em);stroke-linecap:round}
.ring .v{font-family:var(--font-m);font-size:11px;font-weight:500;fill:var(--text);font-variant-numeric:tabular-nums}

/* result-card variant: top result with mini swatch */
.stat-card.top-result-card .v{display:flex;align-items:center;gap:10px;font-family:var(--font-d);font-style:italic;font-size:26px;letter-spacing:-0.005em}
.stat-card.top-result-card .v .swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.stat-card .legend{display:flex;flex-direction:column;gap:4px;font-family:var(--font-m);font-size:10.5px;color:var(--text-faint)}
.stat-card .legend .li{display:flex;align-items:center;gap:6px}
.stat-card .legend .li .sw{width:8px;height:8px;border-radius:2px}
.stat-card .legend .li .pct{margin-left:auto;color:var(--text-mute);font-variant-numeric:tabular-nums}

/* ================================================
   SOURCE BREAKDOWN
================================================ */
.source-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}
.bar-chart{padding:16px 20px 20px}
.bar-chart .legend{display:flex;gap:14px;font-family:var(--font-m);font-size:10.5px;color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:14px}
.bar-chart .legend .li{display:flex;align-items:center;gap:6px}
.bar-chart .legend .li .sw{width:10px;height:10px;border-radius:2px}
.bar-chart .legend .li .sw.start{background:var(--olive-300)}
.bar-chart .legend .li .sw.comp{background:var(--olive-700)}
.bar-rows{display:flex;flex-direction:column;gap:14px}
.bar-row{display:grid;grid-template-columns:90px 1fr 80px;gap:14px;align-items:center;font-size:12.5px}
.bar-row .src{
  display:inline-flex;align-items:center;gap:8px;font-family:var(--font-s);color:var(--text);
}
.bar-row .src .src-dot{width:8px;height:8px;border-radius:2px}
.bar-row .src .src-dot.tt{background:var(--src-tt)}
.bar-row .src .src-dot.ig{background:var(--src-ig)}
.bar-row .src .src-dot.fb{background:var(--src-fb)}
.bar-row .src .src-dot.dr{background:var(--src-dr)}
.bar-row .bar-track{
  position:relative;height:22px;background:var(--surface-2);border-radius:5px;overflow:hidden;
}
.bar-row .bar-track .b-start{
  position:absolute;left:0;top:0;height:100%;background:var(--olive-300);border-radius:inherit;
}
.bar-row .bar-track .b-comp{
  position:absolute;left:0;top:0;height:100%;background:var(--olive-700);border-radius:inherit;
}
.bar-row .bar-track .b-num{
  position:absolute;top:50%;transform:translateY(-50%);
  font-family:var(--font-m);font-size:11px;color:var(--cream-50);font-variant-numeric:tabular-nums;
  padding:0 8px;
}
.bar-row .bar-track .b-num.outside{color:var(--text-mute)}
.bar-row .rate{
  text-align:right;font-family:var(--font-m);font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;
}
.bar-row .rate .pct{font-weight:500}
.bar-row .rate .lbl{font-size:10px;color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase;display:block}

.src-mini{
  width:100%;font-size:12px;border-collapse:separate;border-spacing:0;
}
.src-mini thead th{
  text-align:left;padding:10px 14px;
  font-family:var(--font-m);font-size:10px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;
  background:var(--surface-2);border-bottom:1px solid var(--border);
}
.src-mini thead th.num{text-align:right}
.src-mini td{padding:10px 14px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.src-mini tr:last-child td{border-bottom:none}
.src-mini td.num{text-align:right}
.src-mini td.src{display:flex;align-items:center;gap:7px;font-variant-numeric:normal;color:var(--text)}
.src-mini td.src .sw{width:7px;height:7px;border-radius:2px}

/* ================================================
   FUNNEL DROP-OFF CHART
================================================ */
.funnel-chart{padding:18px 24px 22px;position:relative}
.funnel-chart-svg-wrap{position:relative;height:280px;margin-top:6px}
.funnel-chart-svg-wrap svg{width:100%;height:100%;overflow:visible}
.funnel-chart .x-labels{
  display:grid;gap:0;margin-top:12px;
  font-family:var(--font-m);font-size:10.5px;color:var(--text-faint);letter-spacing:0.04em;
}
.funnel-chart .x-label{
  text-align:center;padding:0 4px;
  display:flex;flex-direction:column;gap:3px;align-items:center;
}
.funnel-chart .x-label .num{color:var(--text-mute);font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase}
.funnel-chart .x-label .name{color:var(--text);font-family:var(--font-s);font-size:11.5px;letter-spacing:0;text-align:center;line-height:1.25;text-transform:none;max-width:100%}
.funnel-chart .x-label.cta .name{color:var(--accent)}
.funnel-chart .x-label.cta .num{color:var(--accent)}

.funnel-chart .tooltip{
  position:absolute;background:var(--n-900);color:var(--cream-50);
  padding:10px 12px;border-radius:8px;
  font-family:var(--font-s);font-size:12px;
  pointer-events:none;box-shadow:var(--sh-3);
  display:flex;flex-direction:column;gap:6px;min-width:180px;
}
.funnel-chart .tooltip .hd{display:flex;justify-content:space-between;gap:10px;font-family:var(--font-m);font-size:10.5px;color:color-mix(in oklch,var(--cream-50) 60%,transparent);letter-spacing:0.06em;text-transform:uppercase}
.funnel-chart .tooltip .vmain{font-family:var(--font-d);font-style:italic;font-size:18px;color:var(--cream-50);letter-spacing:-0.005em}
.funnel-chart .tooltip .row{display:flex;justify-content:space-between;font-size:11.5px;color:color-mix(in oklch,var(--cream-50) 75%,transparent)}
.funnel-chart .tooltip .row .v{color:var(--cream-50);font-variant-numeric:tabular-nums}
.funnel-chart .tooltip .thumb{
  width:100%;height:80px;background:var(--cream-100);border-radius:6px;border:1px solid color-mix(in oklch,var(--cream-50) 25%,transparent);
  display:flex;flex-direction:column;padding:7px 8px;gap:4px;
}
.funnel-chart .tooltip .thumb .pb{height:2px;background:var(--olive-500);width:60%;border-radius:1px}
.funnel-chart .tooltip .thumb .ln{height:3px;background:var(--olive-700);border-radius:1px}
.funnel-chart .tooltip .thumb .ln.opt{background:var(--cream-300);height:7px}
.funnel-chart .tooltip .thumb .ln.opt.sel{background:var(--olive-500)}
.funnel-chart .tooltip .thumb .cta{height:5px;background:var(--olive-500);border-radius:1px;margin-top:auto}
.funnel-chart .tooltip::after{
  content:"";position:absolute;bottom:-5px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:10px;height:10px;background:var(--n-900);
}
.funnel-chart-bar{cursor:pointer}
.funnel-chart-bar rect.fg{transition:opacity var(--m-mid) var(--ease)}
.funnel-chart-bar:hover rect.fg{opacity:0.85}
.funnel-chart-bar text.cnt{
  font-family:var(--font-m);font-size:11px;font-weight:500;fill:var(--text);font-variant-numeric:tabular-nums;
}
.funnel-chart-bar text.dropoff{
  font-family:var(--font-m);font-size:9.5px;fill:var(--error);
}
.funnel-chart .axis-line{stroke:var(--border);stroke-width:1}
.funnel-chart .grid-line{stroke:var(--border);stroke-width:1;stroke-dasharray:2 3;opacity:0.6}

/* ================================================
   RESULT DONUT
================================================ */
.result-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:0}
.result-donut-wrap{
  padding:24px;display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border);position:relative;
}
.result-donut{display:block;width:240px;height:240px}
.result-donut .arc{transition:opacity var(--m-mid) var(--ease),transform var(--m-mid) var(--ease-em);transform-origin:center;cursor:pointer}
.result-donut .arc:hover{opacity:0.85}
.result-donut .arc.is-active{transform:scale(1.04)}
.result-donut-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;
}
.result-donut-center .total{font-family:var(--font-d);font-style:italic;font-size:36px;color:var(--text);letter-spacing:-0.01em;line-height:1}
.result-donut-center .lbl{font-family:var(--font-m);font-size:10px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase}

.result-list{padding:18px 22px;display:flex;flex-direction:column;gap:10px;justify-content:center}
.result-row{
  display:grid;grid-template-columns:18px 1fr auto auto;gap:12px;align-items:center;
  padding:8px 10px;border-radius:var(--r-md);cursor:pointer;
  transition:background var(--m-fast) var(--ease);
}
.result-row:hover{background:var(--surface-2)}
.result-row.is-active{background:var(--surface-2);outline:1.5px solid var(--accent);outline-offset:-1.5px}
.result-row .sw{width:14px;height:14px;border-radius:4px}
.result-row .nm{display:flex;flex-direction:column;gap:1px}
.result-row .nm .h{font-family:var(--font-d);font-style:italic;font-size:18px;color:var(--text);line-height:1.1;letter-spacing:-0.005em}
.result-row .nm .d{font-size:11.5px;color:var(--text-mute);font-family:var(--font-s)}
.result-row .pct{
  font-family:var(--font-m);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
}
.result-row .pct .lbl{font-size:9.5px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase}
.result-row .filter-icon{color:var(--text-faint);opacity:0;transition:opacity var(--m-fast) var(--ease)}
.result-row:hover .filter-icon,.result-row.is-active .filter-icon{opacity:1}
.result-row .filter-icon svg{width:13px;height:13px}

/* ================================================
   RESPONSES TABLE
================================================ */
.resp-toolbar{
  padding:14px 20px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;
}
.filter-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-full);padding:5px 11px;
  font-family:var(--font-s);font-size:12px;color:var(--text-mute);cursor:pointer;
  transition:border-color var(--m-fast) var(--ease);
}
.filter-chip:hover{border-color:var(--border-strong);color:var(--text)}
.filter-chip.is-set{background:var(--accent-soft);color:var(--accent);border-color:color-mix(in oklch,var(--olive-500) 35%,transparent)}
.filter-chip .lbl{font-family:var(--font-m);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint)}
.filter-chip.is-set .lbl{color:color-mix(in oklch,var(--olive-700) 65%,transparent)}
.filter-chip svg{width:11px;height:11px}
.resp-toolbar .clear{
  font-size:11.5px;color:var(--text-faint);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-family:var(--font-s);
}
.resp-toolbar .spacer{flex:1}
.resp-toolbar .search{
  display:flex;align-items:center;gap:6px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  padding:0 10px;height:30px;font-size:12.5px;width:200px;
}
.resp-toolbar .search input{flex:1;background:transparent;border:none;outline:none;font:inherit;font-size:12.5px;color:var(--text)}
.resp-toolbar .search input::placeholder{color:var(--text-faint)}
.resp-toolbar .search svg{width:13px;height:13px;color:var(--text-faint)}

.resp-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.resp-table thead th{
  text-align:left;padding:10px 14px;
  font-family:var(--font-m);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);font-weight:500;
  border-bottom:1px solid var(--border);background:var(--surface-2);position:sticky;top:0;
}
.resp-table thead th.num{text-align:right}
.resp-table thead th.sortable{cursor:pointer}
.resp-table thead th.sortable:hover{color:var(--text)}
.resp-table thead th.sortable .sort{display:inline-flex;margin-left:3px;color:var(--text)}
.resp-table tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.resp-table tbody td.num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-m);font-size:12.5px}
.resp-table tbody td.ts{font-family:var(--font-m);font-size:12px;color:var(--text-mute)}
.resp-table tbody tr.row-main{cursor:pointer}
.resp-table tbody tr.row-main:hover{background:var(--surface-2)}
.resp-table tbody tr.row-main.is-expanded{background:var(--surface-2)}
.resp-table tbody tr.row-main.is-expanded td{border-bottom:none}
.resp-table .v-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text)}
.resp-table .v-pill .sw{width:6px;height:6px;border-radius:2px}
.resp-table .src-pill{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;
  background:var(--surface-2);border-radius:4px;padding:2px 7px;color:var(--text-mute);
}
.resp-table .src-pill .sw{width:6px;height:6px;border-radius:2px}
.resp-table .result-pill{
  display:inline-flex;align-items:center;gap:6px;font-family:var(--font-d);font-style:italic;font-size:14px;color:var(--text);
}
.resp-table .result-pill .sw{width:10px;height:10px;border-radius:3px}
.resp-table .cta-cell{display:flex;align-items:center;gap:5px}
.resp-table .cta-cell.yes{color:var(--success)}
.resp-table .cta-cell.no{color:var(--text-faint)}
.resp-table .cta-cell svg{width:13px;height:13px}
.resp-table .actions-cell{display:flex;gap:2px;justify-content:flex-end}
.resp-table .actions-cell .iconbtn{width:24px;height:24px;border-radius:4px;background:transparent;border:none;color:var(--text-faint);cursor:pointer;display:grid;place-items:center}
.resp-table .actions-cell .iconbtn:hover{background:var(--surface);color:var(--text)}
.resp-table .actions-cell .iconbtn svg{width:13px;height:13px}
.resp-table .expander{
  width:18px;height:18px;border-radius:4px;background:var(--surface);border:1px solid var(--border);
  display:grid;place-items:center;color:var(--text-mute);transition:transform var(--m-fast) var(--ease);
}
.resp-table tr.is-expanded .expander{transform:rotate(90deg);background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.resp-table .expander svg{width:11px;height:11px}

.resp-table tr.row-detail td{
  padding:0;background:var(--surface-2);border-bottom:1px solid var(--border);
}
.detail-pane{
  padding:18px 24px 22px;display:grid;grid-template-columns:1.4fr 1fr;gap:24px;
  background:linear-gradient(to bottom,color-mix(in oklch,var(--accent-soft) 60%,var(--surface-2)),var(--surface-2) 12px);
  border-top:1px solid color-mix(in oklch,var(--olive-500) 25%,var(--border));
}
.detail-pane .col h4{
  font-family:var(--font-m);font-size:10.5px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;
  margin:0 0 10px;
}
.qa-list{display:flex;flex-direction:column;gap:8px}
.qa-row{
  display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:flex-start;
  padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
}
.qa-row .num{font-family:var(--font-m);font-size:10px;color:var(--text-faint);letter-spacing:0.04em;padding-top:2px}
.qa-row .qa{display:flex;flex-direction:column;gap:3px}
.qa-row .q{font-size:12px;color:var(--text-mute);line-height:1.3}
.qa-row .a{font-size:13px;color:var(--text);font-weight:500;line-height:1.3}
.qa-row .a .pill{
  display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent);
  padding:1px 7px;border-radius:var(--r-full);font-family:var(--font-m);font-size:11px;font-weight:500;
}
.dwell-list{display:flex;flex-direction:column;gap:5px;font-family:var(--font-m);font-size:12px}
.dwell-row{display:grid;grid-template-columns:18px 1fr auto;gap:8px;align-items:center}
.dwell-row .num{color:var(--text-faint);font-size:10px}
.dwell-row .name{font-family:var(--font-s);font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dwell-row .bar{height:5px;background:var(--surface);border-radius:999px;overflow:hidden;width:100%}
.dwell-row .bar > div{height:100%;background:var(--olive-500);border-radius:inherit}
.dwell-row .v{color:var(--text);font-variant-numeric:tabular-nums;font-size:11.5px;min-width:38px;text-align:right}
.dwell-row.dropped .v{color:var(--error)}
.dwell-row.dropped .name{color:var(--text-faint);font-style:italic}
.detail-meta{
  display:flex;flex-direction:column;gap:8px;font-family:var(--font-m);font-size:11px;color:var(--text-mute);
  padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);margin-top:14px;
}
.detail-meta .r{display:flex;justify-content:space-between;gap:10px}
.detail-meta .r .k{color:var(--text-faint);letter-spacing:0.04em;text-transform:uppercase;font-size:10px}
.detail-meta .r .v{color:var(--text);font-variant-numeric:tabular-nums}

.resp-pagination{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;border-top:1px solid var(--border);
  font-family:var(--font-m);font-size:11.5px;color:var(--text-mute);letter-spacing:0.02em;
}
.resp-pagination .pages{display:flex;gap:4px;align-items:center}
.resp-pagination .pages button{
  min-width:26px;height:26px;border-radius:5px;background:transparent;border:1px solid transparent;
  font:inherit;font-size:11.5px;font-family:var(--font-m);color:var(--text-mute);cursor:pointer;padding:0 7px;
}
.resp-pagination .pages button:hover{background:var(--surface-2);color:var(--text)}
.resp-pagination .pages button.is-active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.resp-pagination .pages button:disabled{opacity:0.4;cursor:not-allowed}

/* ================================================
   EMPTY STATE
================================================ */
.empty-hero{
  padding:48px 28px 36px;
  display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, color-mix(in oklch, var(--olive-500) 6%, transparent), transparent 70%),
    var(--surface);
  border-bottom:1px solid var(--border);
}
.empty-hero .pulse-stack{
  position:relative;width:60px;height:60px;display:grid;place-items:center;
  margin-bottom:8px;
}
.empty-hero .pulse-stack .ring{
  position:absolute;inset:0;border-radius:999px;border:1.5px solid var(--accent);
  opacity:0.3;animation:emp-pulse 2s var(--ease-em) infinite;
}
.empty-hero .pulse-stack .ring:nth-child(2){animation-delay:0.5s}
.empty-hero .pulse-stack .ring:nth-child(3){animation-delay:1s}
.empty-hero .pulse-stack .center{
  position:relative;width:36px;height:36px;border-radius:999px;
  background:linear-gradient(135deg,var(--olive-700),var(--olive-500));
  display:grid;place-items:center;color:var(--cream-50);
}
.empty-hero .pulse-stack .center svg{width:16px;height:16px}
@keyframes emp-pulse{from{transform:scale(1);opacity:0.4}to{transform:scale(2.2);opacity:0}}

.empty-hero h2{font-family:var(--font-d);font-style:italic;font-weight:400;font-size:42px;margin:0;letter-spacing:-0.01em;line-height:1.05;color:var(--text);max-width:520px}
.empty-hero h2 em{color:var(--accent)}
.empty-hero .sub{font-size:14px;color:var(--text-mute);max-width:520px;margin:0;line-height:1.55}

.empty-share-card{
  width:min(720px,100%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--sh-2);
  padding:18px 18px 18px;display:flex;flex-direction:column;gap:14px;margin-top:6px;
}
.empty-share-card .url-input{
  display:flex;align-items:center;gap:8px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:0 4px 0 14px;height:46px;font-family:var(--font-m);font-size:14px;color:var(--text);
}
.empty-share-card .url-input .url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-share-card .url-input .copy{
  height:36px;padding:0 14px;border-radius:6px;background:var(--accent);color:var(--accent-fg);
  border:none;font:inherit;font-size:12.5px;font-family:var(--font-s);font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
}
.empty-share-card .url-input .copy svg{width:13px;height:13px}
.per-source-mini{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border);padding-top:8px}
.per-source-mini .lbl{font-family:var(--font-m);font-size:10px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;padding:6px 0 4px}
.per-source-mini .row{
  display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center;
  padding:6px 4px;border-radius:5px;
}
.per-source-mini .row:hover{background:var(--surface-2)}
.per-source-mini .src-pill{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;
  padding:2px 8px;border-radius:var(--r-full);font-weight:500;
}
.per-source-mini .src-pill .sw{width:6px;height:6px;border-radius:2px}
.per-source-mini .src-pill.tt{background:color-mix(in oklch,var(--src-tt) 16%,transparent);color:var(--src-tt)}
.per-source-mini .src-pill.tt .sw{background:var(--src-tt)}
.per-source-mini .src-pill.ig{background:color-mix(in oklch,var(--src-ig) 16%,transparent);color:var(--src-ig)}
.per-source-mini .src-pill.ig .sw{background:var(--src-ig)}
.per-source-mini .src-pill.fb{background:color-mix(in oklch,var(--src-fb) 16%,transparent);color:var(--src-fb)}
.per-source-mini .src-pill.fb .sw{background:var(--src-fb)}
.per-source-mini .src-pill.dr{background:var(--surface-2);color:var(--text-mute)}
.per-source-mini .src-pill.dr .sw{background:var(--src-dr)}
.per-source-mini .url-text{font-family:var(--font-m);font-size:12px;color:var(--text-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.per-source-mini .url-text strong{color:var(--text);font-weight:500}
.per-source-mini .copy-mini{
  width:24px;height:24px;border-radius:4px;background:transparent;border:1px solid transparent;
  color:var(--text-faint);cursor:pointer;display:grid;place-items:center;
}
.per-source-mini .row:hover .copy-mini{border-color:var(--border);color:var(--text-mute)}
.per-source-mini .copy-mini:hover{background:var(--surface);color:var(--text)}
.per-source-mini .copy-mini svg{width:13px;height:13px}

.empty-secondary{margin-top:18px;display:flex;align-items:center;gap:14px;font-size:13px;color:var(--text-mute)}
.empty-secondary .test{
  display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:500;text-decoration:none;
}
.empty-secondary .test:hover{text-decoration:underline}
.empty-secondary .test svg{width:13px;height:13px}

/* skeleton sections in empty state */
.skel-section{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 20px;display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;
}
.skel-section .head{display:flex;justify-content:space-between;align-items:baseline}
.skel-section .head h3{
  font-family:var(--font-d);font-style:italic;font-weight:400;font-size:18px;color:var(--text-mute);margin:0;letter-spacing:-0.005em;
}
.skel-section .head .ribbon{
  font-family:var(--font-m);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);
  background:var(--surface-2);padding:2px 8px;border-radius:4px;
}
.skel-section .ph{
  background:repeating-linear-gradient(135deg,var(--surface-2) 0 8px,var(--n-50) 8px 16px);
  border-radius:8px;height:100%;min-height:60px;
  display:grid;place-items:center;
  font-family:var(--font-m);font-size:11px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;
}

.empty-skel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.empty-skel-grid .skel-section{min-height:120px}

/* ================================================
   MOBILE
================================================ */
.dash.mobile{width:390px}
.dash.mobile .dash-topbar{padding:10px 16px}
.dash.mobile .dash-topbar .crumb{font-size:11.5px}
.dash.mobile .dash-topbar .actions .s-btn span:not(.kbd){display:none}
.dash.mobile .dash-hero{padding:18px 16px 14px;gap:10px}
.dash.mobile .dash-hero .h1{font-size:28px}
.dash.mobile .dash-hero .row1{gap:8px}
.dash.mobile .dash-hero .updated{display:none}

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

function fmtNum(n){ return n.toLocaleString('en-US'); }

// ---------- Sparkline ----------
function Sparkline({data, w=120, h=40}){
  const max = Math.max(...data), min = Math.min(...data);
  const range = max-min || 1;
  const step = w/(data.length-1);
  const pts = data.map((v,i)=>[i*step, h - ((v-min)/range)*(h-6) - 3]);
  const d = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area = d + ` L ${w} ${h} L 0 ${h} Z`;
  const last = pts[pts.length-1];
  return <svg className="spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
    <path className="area" d={area}/>
    <path className="line" d={d}/>
    <circle cx={last[0]} cy={last[1]} r="2.5"/>
  </svg>;
}

// ---------- Progress ring ----------
function ProgressRing({pct=0.62, size=58, stroke=5, color="var(--accent)"}){
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  return <svg className="ring progress-circle" width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle className="track" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}/>
    <circle className="fill" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}
      stroke={color} strokeDasharray={c} strokeDashoffset={c*(1-pct)}
      transform={`rotate(-90 ${size/2} ${size/2})`}/>
    <text className="v" x="50%" y="50%" textAnchor="middle" dominantBaseline="central">{Math.round(pct*100)}%</text>
  </svg>;
}

// ============================================================
// FUNNEL DROP-OFF CHART
// ============================================================
function FunnelChart({hoverIdx=2}){
  const max = FUNNEL_SCREENS[0].count;
  const W = 1180, H = 240, pad = {l:40,r:20,t:20,b:10};
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const barW = innerW / FUNNEL_SCREENS.length * 0.7;
  const gap = innerW / FUNNEL_SCREENS.length;

  // y-grid
  const ticks = [0, 1000, 2000, 3000];
  return <div className="card funnel-chart">
    <div className="funnel-chart-svg-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        {ticks.map(t=>{
          const y = pad.t + innerH - (t/3500)*innerH;
          return <g key={t}>
            <line className="grid-line" x1={pad.l} x2={W-pad.r} y1={y} y2={y}/>
            <text x={pad.l-8} y={y+3} fontFamily="var(--font-m)" fontSize="10" fill="var(--text-faint)" textAnchor="end" letterSpacing="0.04em">{fmtNum(t)}</text>
          </g>;
        })}
        <line className="axis-line" x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b}/>
        {/* connecting drop-off polygon */}
        <path d={
          `M ${pad.l + gap*0 + gap*0.5 - barW/2} ${H-pad.b}` +
          FUNNEL_SCREENS.map((s,i)=>{
            const x = pad.l + gap*i + gap*0.5;
            const h = (s.count/3500)*innerH;
            const y = H - pad.b - h;
            return ` L ${x - barW/2} ${y} L ${x + barW/2} ${y}`;
          }).join('') +
          ` L ${pad.l + gap*(FUNNEL_SCREENS.length-1) + gap*0.5 + barW/2} ${H-pad.b} Z`
        } fill="color-mix(in oklch, var(--olive-500) 8%, transparent)"/>
        {FUNNEL_SCREENS.map((s,i)=>{
          const x = pad.l + gap*i + gap*0.5 - barW/2;
          const h = (s.count/3500)*innerH;
          const y = H - pad.b - h;
          const dropoff = i>0 ? ((FUNNEL_SCREENS[i-1].count - s.count)/FUNNEL_SCREENS[i-1].count*100).toFixed(1) : null;
          const isHover = i===hoverIdx;
          const fillColor = s.isCta ? "var(--olive-700)" : (isHover ? "var(--olive-700)" : "var(--olive-500)");
          return <g key={i} className="funnel-chart-bar">
            <rect className="fg" x={x} y={y} width={barW} height={h} rx="4" fill={fillColor} opacity={isHover?1:0.92}/>
            <text className="cnt" x={x+barW/2} y={y-7} textAnchor="middle">{fmtNum(s.count)}</text>
            {dropoff && parseFloat(dropoff)>2 && <text className="dropoff" x={x+barW/2} y={y-22} textAnchor="middle">−{dropoff}%</text>}
          </g>;
        })}
      </svg>
      {/* hover tooltip on screen 3 */}
      {hoverIdx!=null && <div className="tooltip" style={{
        left:`calc(${(pad.l + gap*hoverIdx + gap*0.5)/W*100}% - 100px)`,
        bottom:`calc(${((FUNNEL_SCREENS[hoverIdx].count/3500)*innerH + pad.b)/H*100}% + 12px)`,
      }}>
        <div className="hd"><span>Screen {FUNNEL_SCREENS[hoverIdx].n}</span><span>{FUNNEL_SCREENS[hoverIdx].name}</span></div>
        <div className="thumb">
          <div className="pb"></div>
          <div className="ln"></div>
          <div className="ln opt"></div>
          <div className="ln opt sel"></div>
          <div className="ln opt"></div>
          <div className="cta"></div>
        </div>
        <div className="vmain">{fmtNum(FUNNEL_SCREENS[hoverIdx].count)} <span style={{fontFamily:"var(--font-m)",fontSize:11,fontStyle:"normal",color:"color-mix(in oklch,var(--cream-50) 60%,transparent)"}}>users still in funnel</span></div>
        <div className="row"><span>Drop-off from prev</span><span className="v" style={{color:"var(--error)"}}>−6.0%</span></div>
        <div className="row"><span>Avg dwell</span><span className="v">14.2s</span></div>
      </div>}
    </div>
    <div className="x-labels" style={{gridTemplateColumns:`repeat(${FUNNEL_SCREENS.length},1fr)`}}>
      {FUNNEL_SCREENS.map((s,i)=>(
        <div key={i} className={"x-label"+(s.isCta?" cta":"")}>
          <span className="num">S{s.n}</span>
          <span className="name">{s.name}</span>
        </div>
      ))}
    </div>
  </div>;
}

// RESULT DONUT
// ============================================================
function ResultDistribution({activeId="r3"}){
  const cx=120, cy=120, r=80, ir=52;
  let acc = 0;
  const arcs = RESULTS.map(res=>{
    const frac = res.count/RESULTS_TOTAL;
    const start = acc*2*Math.PI;
    const end = (acc+frac)*2*Math.PI;
    acc += frac;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + r*Math.sin(start), y1 = cy - r*Math.cos(start);
    const x2 = cx + r*Math.sin(end),   y2 = cy - r*Math.cos(end);
    const ix1 = cx + ir*Math.sin(start), iy1 = cy - ir*Math.cos(start);
    const ix2 = cx + ir*Math.sin(end),   iy2 = cy - ir*Math.cos(end);
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`;
    return {res, d};
  });
  return <div className="card" style={{padding:0}}>
    <div className="result-grid">
      <div className="result-donut-wrap">
        <svg className="result-donut" viewBox="0 0 240 240">
          {arcs.map(a=>(
            <path key={a.res.id} className={"arc"+(activeId===a.res.id?" is-active":"")} d={a.d} fill={a.res.color} stroke="var(--surface)" strokeWidth="2"/>
          ))}
        </svg>
        <div className="result-donut-center">
          <span className="total">{fmtNum(RESULTS_TOTAL)}</span>
          <span className="lbl">people · 5 results</span>
        </div>
      </div>
      <div className="result-list">
        {RESULTS.slice().sort((a,b)=>b.count-a.count).map(r=>(
          <div key={r.id} className={"result-row"+(activeId===r.id?" is-active":"")}>
            <span className="sw" style={{background:r.color}}></span>
            <div className="nm">
              <span className="h">{r.name}</span>
              <span className="d">{r.desc}</span>
            </div>
            <div className="pct">
              <span>{((r.count/RESULTS_TOTAL)*100).toFixed(0)}%</span>
              <span className="lbl">{fmtNum(r.count)} ppl</span>
            </div>
            <span className="filter-icon"><Icon.Filter/></span>
          </div>
        ))}
      </div>
    </div>
  </div>;
}

        <div className="dash-section-head">
          <h2>All variants compared</h2>

      </div>

      <div className="dash-section">

Object.assign(window,{PopulatedDashboard,EmptyDashboard});

//---APP---
function App(){
  const { DesignCanvas, DCSection, DCArtboard, PopulatedDashboard, EmptyDashboard } = window;
  return (
    <DesignCanvas title="Quiz Funnel Studio · Results Dashboard">
      <DCSection id="populated" title="01 · Populated dashboard (desktop)">
        <DCArtboard id="dash-desktop" label="Desktop · 1280 (full scroll)" width={1280} height={2400}>
          <PopulatedDashboard/>
        </DCArtboard>
      </DCSection>
      <DCSection id="empty" title="02 · Empty state (no responses yet)">
        <DCArtboard id="dash-empty" label="Empty state · desktop 1280" width={1280} height={1320}>
          <EmptyDashboard/>
        </DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="03 · Mobile (table → cards)">
        <DCArtboard id="dash-mobile" label="Mobile · 390 (responsive collapse)" width={390} height={2600}>
          <PopulatedDashboard mobile/>

      </DCSection>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
