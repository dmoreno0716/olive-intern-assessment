<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Quiz Funnel Studio — Public Funnel & Webview Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --olive-50: oklch(0.96 0.018 125);
  --olive-100:oklch(0.88 0.035 128);
  --olive-300:oklch(0.66 0.055 130);
  --olive-500:oklch(0.46 0.058 132);
  --olive-700:oklch(0.32 0.045 134);
  --olive-900:oklch(0.20 0.030 135);
  --cream-50: oklch(0.985 0.006 85);
  --cream-100:oklch(0.965 0.012 84);
  --cream-200:oklch(0.940 0.018 82);
  --cream-300:oklch(0.905 0.022 80);
  --cream-400:oklch(0.860 0.024 78);

  --r1:oklch(0.62 0.13 45);
  --r2:oklch(0.62 0.13 95);
  --r3:oklch(0.58 0.12 150);
  --r4:oklch(0.62 0.13 245);
  --r5:oklch(0.58 0.13 320);

  --n-0:#fff;
  --n-50: oklch(0.985 0.002 250);
  --n-100:oklch(0.965 0.004 250);
  --n-150:oklch(0.945 0.005 250);
  --n-200:oklch(0.925 0.006 250);
  --n-300:oklch(0.870 0.008 250);
  --n-400:oklch(0.720 0.010 250);
  --n-500:oklch(0.560 0.012 250);
  --n-600:oklch(0.440 0.014 250);
  --n-700:oklch(0.320 0.014 250);
  --n-800:oklch(0.220 0.012 250);
  --n-900:oklch(0.140 0.010 250);

  --success:oklch(0.58 0.12 150);
  --warning:oklch(0.74 0.13 75);
  --error:oklch(0.58 0.18 28);

  --font-d:"Instrument Serif",Iowan Old Style,Georgia,serif;
  --font-s:"Geist",ui-sans-serif,system-ui,sans-serif;
  --font-m:"Geist Mono",ui-monospace,"SF Mono",monospace;

  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-full:999px;
  --sh-1:0 1px 2px rgba(38,44,30,.05),0 1px 1px rgba(38,44,30,.04);
  --sh-2:0 2px 4px rgba(38,44,30,.06),0 4px 12px rgba(38,44,30,.05);
  --sh-3:0 4px 8px rgba(38,44,30,.06),0 12px 28px rgba(38,44,30,.08);

  --m-fast:120ms;--m-mid:200ms;--m-med:320ms;
  --ease:cubic-bezier(0.2,0,0,1);
  --ease-em:cubic-bezier(0.3,0,0,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:var(--font-s);color:var(--n-900);background:var(--n-100);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01"}

.studio{
  --bg:var(--n-50);--surface:var(--n-0);--surface-2:var(--n-100);--surface-3:var(--n-150);
  --border:var(--n-200);--border-strong:var(--n-300);
  --text:var(--n-900);--text-mute:var(--n-600);--text-faint:var(--n-500);
  --accent:var(--olive-700);--accent-soft:color-mix(in oklch,var(--olive-500) 12%,var(--n-0));
  --accent-fg:var(--cream-50);
}
.funnel{
  --fbg:var(--cream-100);--fsurf:var(--cream-50);--fsurf2:var(--cream-200);
  --fborder:var(--cream-300);--fborder-s:var(--cream-400);
  --ftext:var(--olive-900);
  --ftext-m:color-mix(in oklch,var(--olive-900) 50%,var(--cream-100));
  --ftext-f:color-mix(in oklch,var(--olive-900) 30%,var(--cream-100));
  --faccent:var(--olive-500);--faccent-d:var(--olive-700);--faccent-fg:var(--cream-50);
  font-family:var(--font-s);color:var(--ftext);
}

/* Board chrome */
.board{background:var(--n-50);display:flex;flex-direction:column;font-family:var(--font-s)}
.board-header{
  background:var(--n-0);border-bottom:1px solid var(--n-200);
  padding:18px 24px;display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--font-m);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--n-600);
}
.board-header .ttl{
  font-family:var(--font-d);font-style:italic;font-weight:400;
  font-size:22px;letter-spacing:-0.005em;text-transform:none;color:var(--n-900);
}
.board-header .meta{display:flex;gap:24px;align-items:baseline}
.board-header .meta .pill{background:var(--n-100);color:var(--n-700);padding:3px 10px;border-radius:999px;letter-spacing:0.04em}

/* ================================================
   PUBLIC FUNNEL PAGE
================================================ */
.fpage{
  min-height:100%;background:var(--cream-100);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  padding:0;
  overflow:hidden;
}
.fpage.desktop-frame{
  background:
    radial-gradient(ellipse 70% 60% at 50% 0%, color-mix(in oklch, var(--olive-500) 5%, transparent), transparent 60%),
    radial-gradient(ellipse 70% 60% at 50% 100%, color-mix(in oklch, var(--r1) 4%, transparent), transparent 60%),
    var(--cream-100);
  padding:32px;
}
.fpage.desktop-frame::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.03) 100%);
  pointer-events:none;
}

/* canvas (mobile = full bleed; desktop = card) */
.fpage-canvas{
  position:relative;
  width:100%;max-width:480px;
  background:var(--cream-100);
  display:flex;flex-direction:column;
  flex:1;
}
.fpage.desktop-frame .fpage-canvas{
  max-width:480px;height:780px;flex:0 0 auto;
  border-radius:var(--r-xl);
  box-shadow:0 4px 12px rgba(38,44,30,.06),0 24px 64px rgba(38,44,30,.10),0 1px 0 rgba(255,255,255,0.5) inset;
  overflow:hidden;
  border:1px solid var(--cream-300);
}

/* status bar shown when in mobile-fullscreen variant */
.fpage-statusbar{
  height:36px;display:flex;justify-content:space-between;align-items:center;
  padding:8px 22px 0;
  font-family:var(--font-s);font-size:13px;font-weight:500;color:var(--olive-900);
  background:var(--cream-100);
}
.fpage-statusbar .icons{display:flex;gap:4px;align-items:center;font-size:11px;font-weight:500}
.fpage-statusbar .battery{width:22px;height:11px;border:1px solid var(--olive-900);border-radius:2px;position:relative;padding:1.5px}
.fpage-statusbar .battery::after{content:"";position:absolute;right:-2.5px;top:50%;transform:translateY(-50%);width:1.5px;height:5px;background:var(--olive-900);border-radius:0 1px 1px 0}
.fpage-statusbar .battery-fill{height:100%;background:var(--olive-900);border-radius:1px;width:78%}

.fpage-content{flex:1;display:flex;flex-direction:column;padding:0 0 0;position:relative;overflow:hidden}

/* funnel content */
.fpage .pf-progress{height:3px;background:var(--cream-300);border-radius:999px;margin:14px 22px 0;overflow:hidden}
.fpage .pf-progress > div{height:100%;background:var(--olive-500);border-radius:inherit;transition:width var(--m-med) var(--ease-em)}
.fpage .pf-back{padding:14px 16px 0;color:var(--olive-900)}
.fpage .pf-back svg{width:22px;height:22px}
.fpage .pf-body{padding:16px 24px 0;display:flex;flex-direction:column;gap:18px;flex:1}
.fpage .pf-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:color-mix(in oklch,var(--olive-900) 50%,var(--cream-100));font-weight:500}
.fpage .pf-h1{font-family:var(--font-d);font-weight:400;font-size:32px;line-height:1.1;letter-spacing:-0.01em;color:var(--olive-900);margin:0}
.fpage .pf-h1 em{font-style:italic;color:var(--olive-700)}
.fpage .pf-body-text{font-size:15px;line-height:1.55;color:color-mix(in oklch,var(--olive-900) 55%,var(--cream-100));margin:0}
.fpage .pf-options{display:flex;flex-direction:column;gap:8px}
.fpage .pf-option{
  display:flex;align-items:center;gap:12px;
  padding:15px 17px;background:var(--cream-50);
  border:1.5px solid var(--cream-300);border-radius:var(--r-lg);
  font-size:15px;color:var(--olive-900);
  cursor:pointer;
}
.fpage .pf-option .marker{
  width:20px;height:20px;border-radius:999px;border:1.5px solid var(--cream-400);flex-shrink:0;
  display:grid;place-items:center;
}
.fpage .pf-option.sel{border-color:var(--olive-500);background:color-mix(in oklch,var(--olive-500) 6%,var(--cream-50))}
.fpage .pf-option.sel .marker{border-color:var(--olive-500);background:var(--olive-500)}
.fpage .pf-option.sel .marker::after{content:"";width:7px;height:7px;border-radius:999px;background:var(--cream-50)}

.fpage .pf-footer{padding:14px 24px 18px;display:flex;flex-direction:column;gap:8px;margin-top:auto}
.fpage .pf-cta{
  background:var(--olive-500);color:var(--cream-50);border:none;
  padding:16px 20px;border-radius:18px;font:inherit;font-size:16px;font-weight:500;cursor:pointer;
  box-shadow:var(--sh-2);
  transition:transform var(--m-fast) var(--ease-em);
}
.fpage .pf-cta:hover{transform:translateY(-1px)}
.fpage .pf-cta:active{transform:translateY(0)}
.fpage .pf-link{
  background:transparent;border:none;color:color-mix(in oklch,var(--olive-900) 55%,var(--cream-100));
  font:inherit;font-size:13px;text-decoration:underline;text-underline-offset:3px;cursor:pointer;
}

/* powered footer */
.powered-footer{
  padding:6px 0 14px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;
  color:color-mix(in oklch,var(--olive-900) 35%,var(--cream-100));
}
.powered-footer .swirl{
  width:10px;height:10px;border-radius:999px;
  background:conic-gradient(from 60deg,var(--olive-500),var(--olive-300),var(--olive-700),var(--olive-500));
}

/* ----- LOADING ----- */
.fpage-loading{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  padding:48px 24px;
}
.fpage-loading .skel-stack{
  width:100%;display:flex;flex-direction:column;gap:14px;
  padding:0 24px;
}
.fpage-loading .skel{
  background:linear-gradient(90deg, var(--cream-200) 0%, var(--cream-300) 50%, var(--cream-200) 100%);
  background-size:200% 100%;
  animation:fp-shimmer 1.4s linear infinite;
  border-radius:6px;
}
@keyframes fp-shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.fpage-loading .pulse-mark{
  width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--olive-700),var(--olive-500));
  display:grid;place-items:center;color:var(--cream-50);
  font-family:var(--font-d);font-style:italic;font-size:30px;
  box-shadow:0 0 0 0 color-mix(in oklch,var(--olive-500) 40%,transparent);
  animation:fp-mark 1.6s var(--ease-em) infinite;
}
@keyframes fp-mark{
  0%,100%{box-shadow:0 0 0 0 color-mix(in oklch,var(--olive-500) 40%,transparent)}
  50%{box-shadow:0 0 0 14px color-mix(in oklch,var(--olive-500) 0%,transparent)}
}
.fpage-loading .label{font-family:var(--font-m);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:color-mix(in oklch,var(--olive-900) 45%,var(--cream-100))}

/* ----- ERROR STATES ----- */
.fpage-error{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px 28px;text-align:center;gap:16px;
}
.fpage-error .icon-wrap{
  width:64px;height:64px;border-radius:18px;
  background:var(--cream-50);border:1.5px solid var(--cream-300);
  display:grid;place-items:center;color:var(--olive-700);
  margin-bottom:6px;
}
.fpage-error .icon-wrap.warn{border-color:color-mix(in oklch,var(--warning) 40%,var(--cream-300));color:var(--warning);background:color-mix(in oklch,var(--warning) 8%,var(--cream-50))}
.fpage-error .icon-wrap.err{border-color:color-mix(in oklch,var(--error) 40%,var(--cream-300));color:var(--error);background:color-mix(in oklch,var(--error) 8%,var(--cream-50))}
.fpage-error .icon-wrap svg{width:30px;height:30px}
.fpage-error h2{
  font-family:var(--font-d);font-weight:400;font-style:italic;
  font-size:30px;letter-spacing:-0.005em;line-height:1.1;color:var(--olive-900);margin:0;max-width:320px;
}
.fpage-error h2 em{color:var(--olive-700);font-style:italic}
.fpage-error p{
  font-size:14.5px;line-height:1.5;color:color-mix(in oklch,var(--olive-900) 60%,var(--cream-100));margin:0;max-width:320px;
}
.fpage-error .err-id{
  font-family:var(--font-m);font-size:10.5px;color:color-mix(in oklch,var(--olive-900) 40%,var(--cream-100));
  letter-spacing:0.06em;text-transform:uppercase;
  background:var(--cream-50);border:1px solid var(--cream-300);
  border-radius:5px;padding:3px 8px;margin-top:4px;
}
.fpage-error .actions{display:flex;flex-direction:column;gap:8px;margin-top:14px;width:100%;max-width:280px}
.fpage-error .btn{
  padding:14px 20px;border-radius:14px;font:inherit;font-size:15px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--olive-500);background:var(--olive-500);color:var(--cream-50);
  box-shadow:var(--sh-2);
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.fpage-error .btn.secondary{background:transparent;color:var(--olive-700);box-shadow:none}
.fpage-error .btn svg{width:14px;height:14px}

/* ----- COMPLETION (final screen with CTA still active) ----- */
.fpage .completion-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:color-mix(in oklch,var(--olive-500) 14%,var(--cream-50));
  border:1px solid color-mix(in oklch,var(--olive-500) 35%,transparent);
  border-radius:var(--r-full);padding:5px 11px 5px 9px;
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--olive-700);
  align-self:flex-start;
}
.fpage .completion-pill .dot{width:6px;height:6px;border-radius:999px;background:var(--olive-500);box-shadow:0 0 0 3px color-mix(in oklch,var(--olive-500) 22%,transparent)}

/* checkout transition overlay */
.fpage-checkout-overlay{
  position:absolute;inset:0;
  background:color-mix(in oklch,var(--olive-900) 92%,transparent);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
  z-index:10;color:var(--cream-50);
  padding:40px 32px;
}
.fpage-checkout-overlay .ring-spinner{
  width:54px;height:54px;border-radius:999px;
  border:3px solid color-mix(in oklch,var(--cream-50) 22%,transparent);
  border-top-color:var(--cream-50);
  animation:fp-spin 0.9s linear infinite;
}
@keyframes fp-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fpage-checkout-overlay .h{
  font-family:var(--font-d);font-style:italic;font-weight:400;font-size:24px;letter-spacing:-0.005em;text-align:center;
}
.fpage-checkout-overlay .sub{
  font-family:var(--font-m);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  color:color-mix(in oklch,var(--cream-50) 65%,transparent);text-align:center;
}
.fpage-checkout-overlay .events{
  font-family:var(--font-m);font-size:11px;color:color-mix(in oklch,var(--cream-50) 80%,transparent);
  display:flex;flex-direction:column;gap:4px;align-items:flex-start;
  background:rgba(255,255,255,0.06);
  border-radius:8px;padding:10px 14px;border:1px solid rgba(255,255,255,0.08);
}
.fpage-checkout-overlay .events .ev{display:flex;gap:8px;align-items:center}
.fpage-checkout-overlay .events .ev .check{width:12px;height:12px;color:var(--olive-300)}
.fpage-checkout-overlay .events .ev.pending{color:color-mix(in oklch,var(--cream-50) 50%,transparent)}
.fpage-checkout-overlay .events .ev.pending .check{color:color-mix(in oklch,var(--cream-50) 30%,transparent)}

/* state pillrow under desktop card showing what's depicted */
.demo-pill-row{
  position:absolute;top:18px;left:18px;
  display:flex;flex-direction:column;gap:4px;
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.04em;color:color-mix(in oklch,var(--olive-900) 50%,var(--cream-100));
  pointer-events:none;text-transform:uppercase;
}
.demo-pill-row .lbl{color:color-mix(in oklch,var(--olive-900) 35%,var(--cream-100))}
.demo-pill-row .nm{
  background:var(--cream-50);border:1px solid var(--cream-300);border-radius:5px;
  padding:3px 8px;color:var(--olive-900);
}

.url-bar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:var(--cream-50);border:1px solid var(--cream-300);
  padding:6px 14px 6px 12px;border-radius:var(--r-full);
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-m);font-size:11px;color:color-mix(in oklch,var(--olive-900) 60%,var(--cream-100));
  box-shadow:var(--sh-1);
  letter-spacing:0;
}
.url-bar svg{width:11px;height:11px;color:var(--olive-700)}

/* ================================================
   WEBVIEW TEST HARNESS
================================================ */
.harness{
  display:flex;flex-direction:column;
  background:var(--n-50);min-height:100%;
  font-family:var(--font-s);color:var(--n-900);
}
.harness-topbar{
  background:var(--n-0);border-bottom:1px solid var(--n-200);
  padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.harness-topbar .title-block{display:flex;flex-direction:column;gap:1px;margin-right:auto}
.harness-topbar .title-block h1{
  font-family:var(--font-d);font-style:italic;font-weight:400;
  font-size:24px;letter-spacing:-0.005em;line-height:1;color:var(--n-900);margin:0;
}
.harness-topbar .title-block .crumb{
  font-family:var(--font-m);font-size:10.5px;color:var(--n-500);letter-spacing:0.06em;text-transform:uppercase;
}
.harness-topbar .title-block .crumb a{color:var(--n-500);text-decoration:none}
.harness-topbar .title-block .crumb a:hover{color:var(--n-700)}
.harness-topbar .url-loader{
  display:flex;align-items:center;gap:0;
  flex:1;max-width:560px;
}
.harness-topbar .url-input{
  flex:1;background:var(--n-100);border:1px solid var(--n-200);
  border-right:none;border-radius:6px 0 0 6px;
  padding:0 12px;height:34px;
  font-family:var(--font-m);font-size:12.5px;color:var(--n-900);
  display:flex;align-items:center;gap:6px;
}
.harness-topbar .url-input input{flex:1;background:transparent;border:none;outline:none;font:inherit;color:var(--n-900);font-size:12.5px}
.harness-topbar .url-input .scheme{color:var(--n-500)}
.harness-topbar .load-btn{
  background:var(--olive-700);color:var(--cream-50);
  border:1px solid var(--olive-700);
  padding:0 18px;height:34px;border-radius:0 6px 6px 0;
  font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
}
.harness-topbar .load-btn svg{width:13px;height:13px}
.harness-topbar .reload-btn{
  width:34px;height:34px;border:1px solid var(--n-200);background:var(--n-0);
  border-radius:6px;cursor:pointer;color:var(--n-600);
  display:grid;place-items:center;margin-left:8px;
}
.harness-topbar .reload-btn:hover{background:var(--n-100);color:var(--n-900)}
.harness-topbar .reload-btn svg{width:13px;height:13px}
.harness-topbar .indicator{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-m);font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--success);
  padding:4px 10px;border-radius:var(--r-full);
  background:color-mix(in oklch,var(--success) 12%,transparent);
}
.harness-topbar .indicator .dot{width:6px;height:6px;border-radius:999px;background:var(--success);box-shadow:0 0 0 3px color-mix(in oklch,var(--success) 22%,transparent)}

/* harness body */
.harness-body{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px 24px;
}

/* LEFT phone panel */
.phone-panel{
  background:var(--n-0);border:1px solid var(--n-200);border-radius:var(--r-lg);
  display:flex;flex-direction:column;overflow:hidden;
}
.phone-panel .panel-head{
  padding:12px 16px;border-bottom:1px solid var(--n-200);

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
/* design-canvas */

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });

  arrowL: () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M13 8H3M7 4 3 8l4 4"/></svg>,

function jsonHL(obj, indent = 0) {
  // small JSON formatter with span classes
  const pad = (n) => "  ".repeat(n);
  const lines = [];
  const walk = (v, depth, key, last) => {
    const prefix = pad(depth) + (key !== undefined ? `<span class="k">"${key}"</span>: ` : "");
    if (v === null) { lines.push(prefix + `<span class="b">null</span>` + (last ? "" : ",")); return; }
    if (typeof v === "string") { lines.push(prefix + `<span class="s">"${v}"</span>` + (last ? "" : ",")); return; }
    if (typeof v === "number") { lines.push(prefix + `<span class="n">${v}</span>` + (last ? "" : ",")); return; }
    if (typeof v === "boolean") { lines.push(prefix + `<span class="b">${v}</span>` + (last ? "" : ",")); return; }
    if (Array.isArray(v)) {
      lines.push(prefix + "[");
      v.forEach((x, i) => walk(x, depth + 1, undefined, i === v.length - 1));
      lines.push(pad(depth) + "]" + (last ? "" : ","));
      return;
    }
    if (typeof v === "object") {
      lines.push(prefix + "{");
      const keys = Object.keys(v);
      keys.forEach((k, i) => walk(v[k], depth + 1, k, i === keys.length - 1));
      lines.push(pad(depth) + "}" + (last ? "" : ","));
      return;
    }
  };
  walk(obj, indent, undefined, true);
  return lines.join("\n");
}

          <span className="lbl">Payload (JSON)</span>
          <textarea defaultValue={`{
  "userId": "u_4f8a921",
  "token": "eyJhbGciOi…",
  "email": "qa@olive.app",
  "tier": "premium"
}`}/>
        </div>
      </div>
      <div className="send-foot">
        <span className="info"><span className="kbd">⌘</span> <span className="kbd">↵</span> to send · last sent 14s ago</span>
        <button className="send-btn"><Icon.send/>Post to iframe</button>
      </div>
    </div>
  );
}

function SimulatorSection() {
  const [platform, setPlatform] = React.useState("ios");
  const cards = [
    {
      ev: "cta:clicked", evColor: "cta",
      title: platform === "ios" ? "Trigger StoreKit purchase" : "Trigger Play Billing flow",
      desc: platform === "ios"
        ? "Native opens SKPaymentQueue with productId from payload. Simulates the iOS handler your app would mount."
        : "Native opens BillingClient.launchBillingFlow with the SKU from payload. Simulates the Android handler your app would mount.",
      btn: platform === "ios" ? "[Simulate iOS] handle CTA → StoreKit" : "[Simulate Android] handle CTA → Play Billing",
      response: platform === "ios"
        ? [["StoreKit", "→ presented"], ["productId", "olive.slow_burn.14d"], ["txn", "1000000938291" ]]
        : [["BillingClient", "→ launched"], ["sku", "olive_slow_burn_14d"], ["purchaseToken", "abc123…xyz"]],
    },
    {
      ev: "funnel:completed", evColor: "completed",
      title: "Mark conversion in analytics",
      desc: "Native dispatches the conversion to your analytics SDK with funnelId + variant + answer set.",
      btn: platform === "ios" ? "[Simulate iOS] log conversion" : "[Simulate Android] log conversion",
      response: [
        ["Analytics", "→ event=funnel_complete"],
        ["funnelId", "slow-burn"],
        ["variant", "B"],
        ["answers", "{ age-band: 30-39, … }"],
      ],
    },
    {
      ev: "funnel:abandoned", evColor: "abandoned",
      title: "Persist partial state",
      desc: "Native saves the partial answer set so the user can resume next session. Show toast confirming save.",
      btn: platform === "ios" ? "[Simulate iOS] save partial" : "[Simulate Android] save partial",
      response: [
        ["UserDefaults / SharedPrefs", "→ written"],
        ["key", "olive.partial.slow-burn"],
        ["screensCompleted", "3 of 6"],
      ],
    },
    {
      ev: "answer:submitted", evColor: "",
      title: "Forward answer to backend",
      desc: "Native posts the captured answer to /v1/answers — verifies signature + token, returns ack.",
      btn: platform === "ios" ? "[Simulate iOS] POST /v1/answers" : "[Simulate Android] POST /v1/answers",
      response: [
        ["POST", "/v1/answers → 201"],
        ["acked", "true"],
        ["latency", "184ms"],
      ],
    },
  ];
  return (
    <div className="sim-section studio">
      <div className="panel-head">
        <div>
          <h3>Native handler simulators</h3>
          <p className="desc" style={{ margin: "4px 0 0" }}>What the native iOS/Android app does when receiving each postMessage event. Each simulator runs the mock handler and shows its response.</p>
        </div>
        <div className="platform-toggle">
          <button className={platform === "ios" ? "is-active" : ""} onClick={() => setPlatform("ios")}><Icon.apple/>iOS</button>
          <button className={platform === "android" ? "is-active" : ""} onClick={() => setPlatform("android")}><Icon.android/>Android</button>
        </div>
      </div>
      <div className="sim-grid">
        {cards.map((c, i) => (
          <div className="sim-card" key={i}>
            <div className="h">
              <span className={"ev-tag " + c.evColor}>{c.ev}</span>
              <span style={{ fontWeight: 500, fontSize: 13.5, color: "var(--n-900)" }}>{c.title}</span>
            </div>
            <div className="body">
              <p className="desc">{c.desc}</p>
              <button className="sim-btn">{platform === "ios" ? <Icon.apple/> : <Icon.android/>}{c.btn}</button>
              <div className="response">
                <span className="title"><span className="dot"/>Mock response</span>
                {c.response.map(([k, v], j) => (
                  <div key={j}><span className="arrow">→</span> <code>{k}</code> {v}</div>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HarnessBoard() {
  const [url, setUrl] = React.useState("olive-funnels.app/f/slow-burn");
  return (
    <div className="board harness studio" style={{ width: 1320, minHeight: 1480 }}>
      <HarnessTopbar url={url} setUrl={setUrl} loaded={true}/>

        <PhonePanel/>
        <div className="console-stack">
          <ConsolePanel/>
          <SendPanel/>
        </div>
      </div>
      <SimulatorSection/>
    </div>
  );
}

window.HarnessBoard = HarnessBoard;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="public" title="Public funnel page" subtitle="What end users see at olive-funnels.app/f/:funnelId — funnel mode, no studio chrome">

          <PublicFunnelBoard/>
        </DCArtboard>
        <DCPostIt>
          Page bg = warm off-white token (cream-100). Mobile = full bleed. Desktop = letterboxed in radial cream wash, max 480px card with subtle bezel + shadow. Powered-by footer is a tiny tracker — togglable via funnel spec prop.
        </DCPostIt>
        <DCPostIt>
          Completion: when user advances past the final screen, we DON'T inject a thank-you. We stay on the final screen with the CTA still tappable — that CTA tap is the conversion event. If the creator wrote a thank-you, theirs renders.

      <DCSection id="harness" title="Webview test harness" subtitle="/webview-test in Studio · used by Olive QA to verify funnels render correctly inside the mobile app's webview">

          <HarnessBoard/>
        </DCArtboard>
        <DCPostIt>
          Phone is the focal point. Iframe loads the funnel URL — same surface as the public page, just rendered at 390px inside a device shell. Device + orientation togglable.
        </DCPostIt>
        <DCPostIt>
          Console: each row is a postMessage from the iframe. Click to expand JSON. Newest at bottom, animated highlight as it lands. Filter chips toggle event types. Send-to-funnel panel below mirrors the protocol in reverse — host posts INTO the iframe (auth token, user info, etc).
        </DCPostIt>
        <DCPostIt>
          Native simulators show what the real iOS/Android app would do for each event. Toggle iOS/Android at the top right — labels and mock responses swap (StoreKit ↔ Play Billing, UserDefaults ↔ SharedPrefs).

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
